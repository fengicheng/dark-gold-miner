<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暗域防线</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>

        <div id="menuScreen" class="overlay">
            <h1>暗域防线</h1>
            <p class="subtitle">在绝对黑暗中，仅凭雷达和枪火光芒，守卫基地</p>
            <p>鼠标移动瞄准，点击/长按射击<br>数字键1-3使用道具<br>R键重开</p>
            <button id="startBtn" class="btn">开始防御</button>
        </div>

        <div id="endScreen" class="overlay">
            <h2 id="endTitle">基地沦陷！</h2>
            <p id="endScore">得分: 0 / 500</p>
            <button id="endBtn" class="btn">再来一局</button>
        </div>

        <div class="controls-hint">点击/长按=射击 | 1-3=道具 | R=重开</div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
